on: push

jobs:
  test:
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          uv sync
          uv run ruff format . --check
          uv run ruff check .
          uv run mypy
      - run: |
          uv run coverage run -m pytest
          uv run coverage report
